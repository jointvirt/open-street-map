# Образ с Docker Hub (не ghcr.io): у GHCR иногда 403 при анонимном pull.
# Скачивание PBF — сервис osrm-download (curl): образ osrm/osrm-backend на старом Debian без рабочего apt/wget.
services:
  osrm-download:
    image: curlimages/curl:8.11.1
    # Запись в volume /data (иначе у пользователя curl в образе может не быть прав).
    user: "0:0"
    volumes:
      - osrm-data:/data
      - ./docker/osrm/download.sh:/scripts/download.sh:ro
    environment:
      # По умолчанию — ЦФО (Москва и область), ~сотни МиБ, а не вся Россия на несколько ГиБ.
      OSM_PBF_URL: ${OSM_PBF_URL:-https://download.geofabrik.de/russia/central-fed-district-latest.osm.pbf}
    entrypoint: ["/bin/sh", "/scripts/download.sh"]
    restart: "no"
    networks: [routing]

  osrm-prepare:
    platform: linux/amd64
    image: osrm/osrm-backend:latest
    volumes:
      - osrm-data:/data
      - ./docker/osrm/prepare.sh:/scripts/prepare.sh:ro
    entrypoint: ["/bin/bash", "/scripts/prepare.sh"]
    depends_on:
      osrm-download:
        condition: service_completed_successfully
    restart: "no"
    networks: [routing]

  osrm:
    platform: linux/amd64
    image: osrm/osrm-backend:latest
    command:
      [
        "osrm-routed",
        "--algorithm",
        "mld",
        "--port",
        "5000",
        "/data/region.osrm"
      ]
    volumes:
      - osrm-data:/data
    depends_on:
      osrm-prepare:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    networks: [routing]
    # В образе OSRM часто нет wget/curl; /bin/sh может быть dash без /dev/tcp — используем bash.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/bin/bash -c 'timeout 3 bash -c \"</dev/tcp/127.0.0.1/5000\"' || exit 1"
        ]
      interval: 15s
      timeout: 15s
      retries: 12
      start_period: 60s

  routing-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    # OSRM проброшен на хост :5000 — обходим DNS имени сервиса «osrm» (на Docker Desktop часто не резолвится из API).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://0.0.0.0:8080
      # Через хост: порт 5000 сопоставлен с osrm ниже. Альтернатива: http://osrm:5000 если DNS сервисов у вас работает.
      Routing__Osrm__BaseUrl: ${ROUTING_OSRM_BASE_URL:-http://host.docker.internal:5000}
    depends_on:
      osrm:
        condition: service_healthy
    networks: [routing]
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/live >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  osrm-data:

networks:
  routing:
    driver: bridge
